<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heartwood</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #e0e0e0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { max-width: 480px; padding: 2rem; text-align: center; }
        h1 { font-size: 2.5rem; margin-bottom: 1rem; }
        p { font-size: 1.2rem; line-height: 1.6; opacity: 0.8; }
        .status { margin-top: 2rem; padding: 1rem; background: #1a1a1a; border-radius: 8px; font-family: monospace; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Heartwood</h1>
        <p>Hardware signing appliance for Nostr</p>
        <div class="status" id="status">Loading...</div>
    </div>
    <script>
        fetch('/api/status')
            .then(r => r.json())
            .then(d => {
                document.getElementById('status').textContent =
                    'Status: ' + d.status + ' | Version: ' + d.version;
            })
            .catch(() => {
                document.getElementById('status').textContent = 'Connection failed';
            });
    </script>
</body>
</html>
