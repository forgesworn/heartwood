name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary: heartwood-device
            asset: heartwood-aarch64-linux
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: heartwood-device
            asset: heartwood-x86_64-linux

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Set linker for aarch64
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          mkdir -p .cargo
          echo '[target.aarch64-unknown-linux-gnu]' >> .cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> .cargo/config.toml

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p heartwood-device

      - name: Package binary
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.asset }}
          chmod +x ${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          for dir in heartwood-*/; do
            binary="${dir%/}"
            if [ -f "$dir/$binary" ]; then
              sha256sum "$dir/$binary" | sed "s|$dir/||" >> SHA256SUMS
            fi
          done
          cat SHA256SUMS

      - name: Create install script
        run: |
          cat > artifacts/install.sh << 'SCRIPT'
          #!/usr/bin/env bash
          # Heartwood one-liner installer for Raspberry Pi
          set -euo pipefail

          echo "=== Installing Heartwood ==="

          # Detect architecture
          ARCH=$(uname -m)
          case "$ARCH" in
            aarch64) ASSET="heartwood-aarch64-linux" ;;
            x86_64)  ASSET="heartwood-x86_64-linux" ;;
            *) echo "Unsupported architecture: $ARCH"; exit 1 ;;
          esac

          # Get latest release URL
          REPO="forgesworn/heartwood"
          if command -v jq &> /dev/null; then
            TAG=$(curl -sL "https://api.github.com/repos/$REPO/releases/latest" | jq -r .tag_name)
          else
            TAG=$(curl -sL "https://api.github.com/repos/$REPO/releases/latest" | grep '"tag_name"' | head -1 | cut -d'"' -f4)
          fi
          if [ -z "$TAG" ]; then
            echo "ERROR: Could not determine latest release tag"; exit 1
          fi
          BASE_URL="https://github.com/$REPO/releases/download/$TAG"

          TMPDIR=$(mktemp -d)
          trap 'rm -rf "$TMPDIR"' EXIT

          echo "Downloading Heartwood $TAG for $ARCH..."
          curl -sL "$BASE_URL/$ASSET" -o "$TMPDIR/$ASSET"
          curl -sL "$BASE_URL/SHA256SUMS" -o "$TMPDIR/SHA256SUMS"

          # Verify binary integrity
          echo "Verifying SHA-256 checksum..."
          cd "$TMPDIR"
          if ! grep "$ASSET" SHA256SUMS | sha256sum -c --quiet 2>/dev/null; then
            echo "ERROR: Checksum verification FAILED. Aborting."
            exit 1
          fi
          echo "Checksum verified."
          cd /

          sudo cp "$TMPDIR/$ASSET" /usr/local/bin/heartwood
          sudo chmod +x /usr/local/bin/heartwood

          # Install Tor if not present
          if ! command -v tor &> /dev/null; then
            echo "Installing Tor..."
            sudo apt-get update -qq
            sudo apt-get install -y -qq tor
          fi

          # Create heartwood user
          sudo useradd -r -s /usr/sbin/nologin heartwood 2>/dev/null || true
          sudo mkdir -p /var/lib/heartwood
          sudo chown heartwood:heartwood /var/lib/heartwood
          sudo chmod 700 /var/lib/heartwood

          # Configure Tor hidden service
          sudo mkdir -p /etc/tor/torrc.d
          echo "SocksPort 0" | sudo tee /etc/tor/torrc.d/heartwood.conf > /dev/null
          echo "HiddenServiceDir /var/lib/tor/heartwood/" | sudo tee -a /etc/tor/torrc.d/heartwood.conf > /dev/null
          echo "HiddenServicePort 80 127.0.0.1:3000" | sudo tee -a /etc/tor/torrc.d/heartwood.conf > /dev/null
          sudo systemctl restart tor

          # Install systemd service
          cat << 'SERVICE' | sudo tee /etc/systemd/system/heartwood.service > /dev/null
          [Unit]
          Description=Heartwood signing appliance
          After=network-online.target tor.service
          Wants=network-online.target tor.service

          [Service]
          Type=simple
          User=heartwood
          Group=heartwood
          ExecStart=/usr/local/bin/heartwood
          Restart=always
          RestartSec=10
          StartLimitBurst=5
          StartLimitIntervalSec=60
          Environment=RUST_LOG=info
          Environment=HEARTWOOD_BIND=0.0.0.0:3000
          ProtectSystem=strict
          ProtectHome=true
          ReadWritePaths=/var/lib/heartwood
          RuntimeDirectory=heartwood
          RuntimeDirectoryMode=0700
          NoNewPrivileges=true
          PrivateTmp=true
          CapabilityBoundingSet=
          SystemCallFilter=@system-service
          SystemCallErrorNumber=EPERM
          MemoryDenyWriteExecute=true
          RestrictRealtime=true
          RestrictSUIDSGID=true
          LockPersonality=true
          ProtectKernelTunables=true
          ProtectKernelModules=true
          ProtectControlGroups=true
          RestrictNamespaces=true
          DevicePolicy=closed
          DeviceAllow=/dev/i2c-1 rw

          [Install]
          WantedBy=multi-user.target
          SERVICE

          sudo systemctl daemon-reload
          sudo systemctl enable heartwood

          # Install Node.js for the bunker sidecar
          if ! command -v node &> /dev/null; then
            echo "Installing Node.js..."
            sudo apt-get install -y -qq nodejs npm
          fi

          # Install bunker sidecar
          echo "Installing bunker sidecar..."
          sudo mkdir -p /opt/heartwood/bunker
          for f in index.mjs lib.mjs package.json package-lock.json; do
            curl -sL "https://raw.githubusercontent.com/$REPO/$TAG/bunker/$f" \
              -o "/opt/heartwood/bunker/$f"
          done
          cd /opt/heartwood/bunker && sudo npm ci --omit=dev && cd /
          sudo chown -R heartwood:heartwood /opt/heartwood

          cat << 'BUNKER_SERVICE' | sudo tee /etc/systemd/system/heartwood-bunker.service > /dev/null
          [Unit]
          Description=Heartwood NIP-46 bunker
          After=network-online.target heartwood.service
          Wants=network-online.target
          Requires=heartwood.service
          StartLimitBurst=5
          StartLimitIntervalSec=60

          [Service]
          Type=simple
          User=heartwood
          Group=heartwood
          WorkingDirectory=/opt/heartwood/bunker
          ExecStart=/usr/bin/node index.mjs
          Restart=always
          RestartSec=15
          Environment=NODE_ENV=production
          ProtectSystem=strict
          ProtectHome=true
          ReadWritePaths=/var/lib/heartwood
          ReadOnlyPaths=/opt/heartwood
          # MemoryDenyWriteExecute intentionally omitted — Node.js V8 JIT needs W+X pages
          NoNewPrivileges=true
          PrivateTmp=true
          CapabilityBoundingSet=
          SystemCallFilter=@system-service
          SystemCallErrorNumber=EPERM
          RestrictRealtime=true
          RestrictSUIDSGID=true
          LockPersonality=true
          ProtectKernelTunables=true
          ProtectKernelModules=true
          ProtectControlGroups=true
          RestrictNamespaces=true
          DevicePolicy=closed
          MemoryMax=256M
          TasksMax=32

          [Install]
          WantedBy=multi-user.target
          BUNKER_SERVICE

          sudo systemctl daemon-reload
          sudo systemctl enable heartwood heartwood-bunker
          sudo systemctl start heartwood
          sudo systemctl start heartwood-bunker

          echo ""
          echo "=== Heartwood installed ==="
          echo "Status:  sudo systemctl status heartwood"
          echo "Bunker:  sudo systemctl status heartwood-bunker"
          echo "Logs:    sudo journalctl -u heartwood -u heartwood-bunker -f"
          echo ""
          echo "Waiting for Tor hidden service..."
          for i in $(seq 1 60); do
            if [ -f /var/lib/tor/heartwood/hostname ]; then
              echo ""
              echo "Your .onion address:"
              sudo cat /var/lib/tor/heartwood/hostname
              echo ""
              echo "Scan this with your Nostr client to pair."
              exit 0
            fi
            sleep 1
            printf "."
          done
          echo ""
          echo "Tor is still bootstrapping. Check later:"
          echo "  sudo cat /var/lib/tor/heartwood/hostname"
          SCRIPT
          chmod +x artifacts/install.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          generate_release_notes: true
          files: |
            artifacts/heartwood-aarch64-linux/heartwood-aarch64-linux
            artifacts/heartwood-x86_64-linux/heartwood-x86_64-linux
            artifacts/SHA256SUMS
            artifacts/install.sh
