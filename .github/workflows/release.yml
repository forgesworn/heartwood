name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            asset: heartwood-bridge-aarch64-linux
            gcc_pkg: gcc-aarch64-linux-gnu
            linker: aarch64-linux-gnu-gcc
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset: heartwood-bridge-x86_64-linux
            gcc_pkg: ""
            linker: ""
          - target: armv7-unknown-linux-gnueabihf
            os: ubuntu-latest
            asset: heartwood-bridge-armv7-linux
            gcc_pkg: gcc-arm-linux-gnueabihf
            linker: arm-linux-gnueabihf-gcc
          - target: riscv64gc-unknown-linux-gnu
            os: ubuntu-latest
            asset: heartwood-bridge-riscv64-linux
            gcc_pkg: gcc-riscv64-linux-gnu
            linker: riscv64-linux-gnu-gcc

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      # The bridge uses serialport with default-features off (no libudev) and
      # rustls (no OpenSSL), so cross-builds need only the target's gcc/linker.
      - name: Install cross-compilation tools
        if: matrix.gcc_pkg != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.gcc_pkg }}

      - name: Configure linker
        if: matrix.linker != ''
        run: |
          mkdir -p .cargo
          echo '[target.${{ matrix.target }}]' >> .cargo/config.toml
          echo 'linker = "${{ matrix.linker }}"' >> .cargo/config.toml

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p heartwood-bridge

      - name: Package binary
        run: |
          cp target/${{ matrix.target }}/release/heartwood-bridge ${{ matrix.asset }}
          chmod +x ${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  publish-crates:
    name: Publish crates to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      # nsec-tree-rs — the derivation primitive, kept as a standalone library.
      - name: Publish nsec-tree-rs
        run: |
          set +e
          out=$(cargo publish -p nsec-tree-rs 2>&1); code=$?
          echo "$out"
          if [ $code -ne 0 ] && ! echo "$out" | grep -q "already exists"; then exit $code; fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release:
    name: Create Release
    needs: [build, publish-crates]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          for dir in heartwood-bridge-*/; do
            binary="${dir%/}"
            if [ -f "$dir/$binary" ]; then
              sha256sum "$dir/$binary" | sed "s|$dir/||" >> SHA256SUMS
            fi
          done
          cat SHA256SUMS

      - name: Create install script
        run: |
          cat > artifacts/install.sh << 'SCRIPT'
          #!/usr/bin/env bash
          # heartwood-bridge one-liner installer for ARM / x86_64 / RISC-V Linux.
          # Installs the headless relay-to-USB signing bridge as a systemd
          # service. The bridge holds no keys and opens no network service of its
          # own — it connects out to relays and talks to a USB-tethered signer.
          set -euo pipefail

          echo "=== Installing heartwood-bridge ==="

          ARCH=$(uname -m)
          case "$ARCH" in
            aarch64)         ASSET="heartwood-bridge-aarch64-linux" ;;
            x86_64)          ASSET="heartwood-bridge-x86_64-linux" ;;
            armv7l|armv7)    ASSET="heartwood-bridge-armv7-linux" ;;
            riscv64)         ASSET="heartwood-bridge-riscv64-linux" ;;
            *) echo "Unsupported architecture: $ARCH"; exit 1 ;;
          esac

          REPO="forgesworn/heartwood"
          if command -v jq &> /dev/null; then
            TAG=$(curl -sL "https://api.github.com/repos/$REPO/releases/latest" | jq -r .tag_name)
          else
            TAG=$(curl -sL "https://api.github.com/repos/$REPO/releases/latest" | grep '"tag_name"' | head -1 | cut -d'"' -f4)
          fi
          if [ -z "$TAG" ]; then
            echo "ERROR: Could not determine latest release tag"; exit 1
          fi
          BASE_URL="https://github.com/$REPO/releases/download/$TAG"

          TMPDIR=$(mktemp -d)
          trap 'rm -rf "$TMPDIR"' EXIT

          echo "Downloading heartwood-bridge $TAG for $ARCH..."
          curl -sL "$BASE_URL/$ASSET" -o "$TMPDIR/$ASSET"
          curl -sL "$BASE_URL/SHA256SUMS" -o "$TMPDIR/SHA256SUMS"

          echo "Verifying SHA-256 checksum..."
          cd "$TMPDIR"
          if ! grep "$ASSET" SHA256SUMS | sha256sum -c --quiet 2>/dev/null; then
            echo "ERROR: Checksum verification FAILED. Aborting."
            exit 1
          fi
          echo "Checksum verified."
          cd /

          sudo cp "$TMPDIR/$ASSET" /usr/local/bin/heartwood-bridge
          sudo chmod +x /usr/local/bin/heartwood-bridge

          # Service account — added to dialout for USB serial access.
          sudo useradd -r -s /usr/sbin/nologin -G dialout heartwood 2>/dev/null \
            || sudo usermod -aG dialout heartwood
          sudo mkdir -p /var/lib/heartwood
          sudo chown heartwood:heartwood /var/lib/heartwood
          sudo chmod 700 /var/lib/heartwood

          # Pick the serial port: honour an existing env, else first USB serial.
          PORT="${HEARTWOOD_SERIAL_PORT:-}"
          if [ -z "$PORT" ]; then
            PORT=$(ls /dev/ttyUSB* /dev/ttyACM* 2>/dev/null | head -1 || true)
          fi
          if [ -z "$PORT" ]; then
            echo "No USB serial device found. Set HEARTWOOD_SERIAL_PORT in"
            echo "/etc/systemd/system/heartwood-bridge.service after plugging in the signer."
            PORT="/dev/ttyUSB0"
          fi
          echo "Using serial port: $PORT"

          cat << SERVICE | sudo tee /etc/systemd/system/heartwood-bridge.service > /dev/null
          [Unit]
          Description=Heartwood relay-to-USB signing bridge
          After=network-online.target
          Wants=network-online.target
          StartLimitBurst=5
          StartLimitIntervalSec=60

          [Service]
          Type=simple
          User=heartwood
          Group=heartwood
          SupplementaryGroups=dialout
          ExecStart=/usr/local/bin/heartwood-bridge
          Restart=always
          RestartSec=10
          Environment=RUST_LOG=info
          Environment=HEARTWOOD_DATA_DIR=/var/lib/heartwood
          Environment=HEARTWOOD_SERIAL_PORT=$PORT
          # Set relays here (comma-separated) or via config.json in the data dir:
          # Environment=HEARTWOOD_RELAYS=wss://relay.example
          ProtectSystem=strict
          ProtectHome=true
          ReadWritePaths=/var/lib/heartwood
          NoNewPrivileges=true
          PrivateTmp=true
          RestrictRealtime=true
          RestrictSUIDSGID=true
          LockPersonality=true
          ProtectKernelTunables=true
          ProtectKernelModules=true
          ProtectControlGroups=true
          RestrictNamespaces=true

          [Install]
          WantedBy=multi-user.target
          SERVICE

          sudo systemctl daemon-reload
          sudo systemctl enable heartwood-bridge

          echo ""
          echo "=== heartwood-bridge installed ==="
          echo "Before first start, provision the bridge secret onto the data dir over USB"
          echo "with the provision CLI (writes /var/lib/heartwood/bridge.secret)."
          echo ""
          echo "Start:   sudo systemctl start heartwood-bridge"
          echo "Status:  sudo systemctl status heartwood-bridge"
          echo "Logs:    sudo journalctl -u heartwood-bridge -f"
          SCRIPT
          chmod +x artifacts/install.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          generate_release_notes: true
          files: |
            artifacts/heartwood-bridge-aarch64-linux/heartwood-bridge-aarch64-linux
            artifacts/heartwood-bridge-x86_64-linux/heartwood-bridge-x86_64-linux
            artifacts/heartwood-bridge-armv7-linux/heartwood-bridge-armv7-linux
            artifacts/heartwood-bridge-riscv64-linux/heartwood-bridge-riscv64-linux
            artifacts/SHA256SUMS
            artifacts/install.sh
